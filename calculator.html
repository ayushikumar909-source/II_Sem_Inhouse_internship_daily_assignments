<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arithmetic Operations</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        input, select, button{
            padding: 10px;
            margin: 5px;
        }

        #result{
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Arithmetic Calculator</h2>

    <input type="number" id="number1" placeholder="Enter First Number">

    <select id="operator">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
    </select>

    <input type="number" id="number2" placeholder="Enter Second Number">

    <br>

    <button type="button" onclick="performArithmeticOperations()">
        Perform Arithmetic Operation
    </button>

    <div id="result"></div>

    <script>
        function performArithmeticOperations() {

            const number1 = parseFloat(document.getElementById("number1").value);
            const number2 = parseFloat(document.getElementById("number2").value);
            const operator = document.getElementById("operator").value;

            let result;

            switch (operator) {
                case "+":
                    result = number1 + number2;
                    break;

                case "-":
                    result = number1 - number2;
                    break;

                case "*":
                    result = number1 * number2;
                    break;

                case "/":
                    if (number2 === 0) {
                        result = "Divide by zero error";
                    } else {
                        result = number1 / number2;
                    }
                    break;

                default:
                    result = "Invalid Operator";
            }

            document.getElementById("result").innerHTML =
                "Result: " + result;
        }
    </script>

</body>
</html>
